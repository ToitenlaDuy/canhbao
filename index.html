<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG ĐÃ BỊ CHIẾM QUYỀN ĐIỀU KHIỂN</title>
    <style>
        body {
            background-color: #000;
            color: #f00; /* Màu đỏ máu */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            cursor: none; /* Ẩn con trỏ chuột */
        }

        /* Hiệu ứng Glitch cho nền */
        .glitch-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 0, 0, 0.9);
            opacity: 0.2;
            animation: glitch-anim 0.2s infinite;
            z-index: -1;
            display: none; /* Chỉ hiện khi cố thoát */
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
            100% { transform: translate(0); }
        }

        .container {
            border: 3px solid #f00;
            padding: 50px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
            background: rgba(10, 0, 0, 0.95);
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000, 0 0 15px #f00;
        }

        .danger-text {
            color: #fff; /* Màu trắng nổi bật */
            font-weight: bold;
            font-size: 1.8rem;
            text-shadow: 0 0 10px #f00, 0 0 20px #f00;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }

        .status-box {
            margin-top: 30px;
            text-align: left;
            font-size: 1rem;
            color: #ff8888;
        }

        .loading-bar {
            width: 100%;
            height: 20px;
            border: 1px solid #f00;
            margin-top: 10px;
            position: relative;
        }

        #bar-fill {
            height: 100%;
            background-color: #f00;
            width: 0%;
            transition: width 0.1s linear;
        }

        #log {
            height: 100px;
            overflow: hidden;
            margin-top: 20px;
            color: #fff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="glitch-bg" id="glitch"></div>

    <div class="container">
        <h1>[ QUYỀN TRUY CẬP ĐÃ BỊ TỪ CHỐI ]</h1>
        <p class="danger-text">"Bạn vừa bị 'hack' vì sự thiếu cảnh giác của chính mình"</p>
        
        <div class="status-box">
            <p>> Đang trích xuất dữ liệu...</p>
            <div class="loading-bar">
                <div id="bar-fill"></div>
            </div>
            <p>Trạng thái: <span id="status">Đang xử lý</span> (<span id="percent">0</span>%)</p>
        </div>

        <div id="log"></div>

        <div class="footer">
            Mọi hành động thoát hoặc can thiệp sẽ làm tăng tốc độ xóa dữ liệu.<br>
            THỜI GIAN CÒN LẠI: <span id="timer">02:00</span>
        </div>
    </div>

    <audio id="alarm" loop>
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Hiệu ứng chạy phần trăm và log
        let count = 0;
        let timeLeft = 120; // 2 phút
        const log = document.getElementById('log');
        const logs = [
            '> Khởi tạo Backdoor...',
            '> Vượt qua Firewall cấp 4...',
            '> Lấy quyền Root...',
            '> Đang nén thư mục C:/Users...',
            '> Mã hóa dữ liệu hình ảnh...',
            '> Đang gửi đến Server #404...',
            '> Xóa log truy cập...'
        ];
        let logIndex = 0;

        const counter = setInterval(() => {
            count++;
            document.getElementById('percent').innerText = count;
            document.getElementById('bar-fill').style.width = count + '%';

            // Thêm log giả
            if (count % 15 === 0 && logIndex < logs.length) {
                const p = document.createElement('p');
                p.innerText = logs[logIndex];
                log.appendChild(p);
                logIndex++;
                if (log.children.length > 4) log.removeChild(log.children[0]);
            }

            if (count >= 100) {
                clearInterval(counter);
                document.getElementById('status').innerText = "HOÀN THÀNH. BẮT ĐẦU XÓA.";
                document.getElementById('status').style.color = "#fff";
                document.getElementById('status').style.textShadow = "0 0 10px #f00";
            }
        }, 120); // Chạy chậm hơn một chút để họ kịp đọc

        // Đếm ngược giả
        const timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = 
                (min < 10 ? '0' + min : min) + ':' + (sec < 10 ? '0' + sec : sec);
            if (timeLeft <= 0) clearInterval(timerInterval);
        }, 1000);

        // --- CÁC HÀNH VI GÂY SỐC ---

        // 1. Cố thoát khi di chuyển chuột ra ngoài
        document.addEventListener('mouseleave', () => {
            document.getElementById('glitch').style.display = 'block';
            document.getElementById('status').innerText = "PHÁT HIỆN CỐ THOÁT. TĂNG TỐC!";
            const alarm = document.getElementById('alarm');
            alarm.play().catch(() => {}); // Cố gắng phát âm thanh
        });

        document.addEventListener('mouseenter', () => {
            document.getElementById('glitch').style.display = 'none';
        });

        // 2. Chặn các phím thoát phổ biến (giả lập)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || (e.ctrlKey && e.key === 'w')) {
                e.preventDefault(); // Chặn hành động thật (không phải lúc nào cũng được)
                alert("CỐ THOÁT LÀ VÔ ÍCH. TOÀN BỘ PHÍM ĐÃ BỊ KHOÁ.");
            }
        });

        // 3. Thông báo bất ngờ
        window.onload = () => {
            setTimeout(() => {
                alert("CRITICAL ERROR: Dữ liệu của bạn đang được xử lý bởi bên thứ ba.");
            }, 5000); // 5 giây sau khi load
        };
    </script>
</body>
</html>
