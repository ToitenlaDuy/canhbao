<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG NGUY CẤP</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #330000; /* Nền đỏ tối ngay lập tức */
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        .container {
            width: 85%;
            max-width: 600px;
            padding: 30px;
            border: 2px solid #ff0000;
            background-color: #000;
            text-align: center;
            box-shadow: 0 0 30px #ff0000;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #ff0000; }
        
        .danger-text {
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .loading-bar {
            width: 100%;
            height: 25px;
            border: 1px solid #ff0000;
            background: #111;
            margin: 15px 0;
        }

        #bar-fill {
            height: 100%;
            background-color: #ff0000;
            width: 0%; /* Sẽ được điều khiển bằng JS */
        }

        #log {
            height: 100px;
            overflow: hidden;
            text-align: left;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid #222;
            padding-top: 10px;
        }

        .footer {
            margin-top: 30px;
            color: #ff0000;
            font-weight: bold;
            animation: blink 0.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body onclick="enableSound()">

    <div class="container">
        <h1>[ CRITICAL ERROR ]</h1>
        <p class="danger-text">"Bạn vừa bị 'hack' vì sự thiếu cảnh giác của chính mình"</p>
        
        <div style="text-align: left;">
            <p>> Tiến độ mã hóa: <span id="percent">0</span>%</p>
            <div class="loading-bar">
                <div id="bar-fill"></div>
            </div>
        </div>

        <div id="log"></div>

        <div class="footer">CHẠM VÀO MÀN HÌNH ĐỂ NGĂN CHẶN!</div>
    </div>

    <audio id="alarm" loop>
        <source src="https://www.soundjay.com/buttons/beep-07.mp3" type="audio/mpeg">
    </audio>

    <script>
        // SỬ DỤNG PHƯƠNG PHÁP CHẠY THEO FRAME (LUÔN CHẠY)
        let progress = 0;
        const bar = document.getElementById('bar-fill');
        const percentText = document.getElementById('percent');
        const log = document.getElementById('log');
        const logs = [
            "> Đang xâm nhập hệ thống...",
            "> Đang tìm kiếm tài liệu nhạy cảm...",
            "> Đang mã hóa file .jpg và .mp4...",
            "> Đang gửi dữ liệu về Server hacker...",
            "> Đang xóa sạch dấu vết khởi động..."
        ];

        function updateProgress() {
            if (progress < 100) {
                progress += 0.15; // Tốc độ chạy thanh tiến độ
                if (progress > 100) progress = 100;

                bar.style.width = progress + "%";
                percentText.innerText = Math.floor(progress);

                // Thêm log dựa trên phần trăm
                if (Math.floor(progress) % 20 === 0 && Math.floor(progress) > 0) {
                    const index = Math.floor(progress / 20) - 1;
                    if (!document.getElementById('log-' + index)) {
                        const p = document.createElement('p');
                        p.id = 'log-' + index;
                        p.innerText = logs[index];
                        log.appendChild(p);
                        log.scrollTop = log.scrollHeight;
                    }
                }
                requestAnimationFrame(updateProgress);
            }
        }

        // Kích hoạt ngay khi load
        window.onload = () => {
            requestAnimationFrame(updateProgress);
            setTimeout(() => { alert("CẢNH BÁO: Phát hiện truy cập trái phép!"); }, 1000);
        };

        // Kích hoạt âm thanh & Fullscreen
        function enableSound() {
            const audio = document.getElementById('alarm');
            audio.play();
            
            const de = document.documentElement;
            if (de.requestFullscreen) de.requestFullscreen();
            else if (de.webkitRequestFullscreen) de.webkitRequestFullscreen();

            document.querySelector('.footer').innerText = "Hệ thống đã bị khóa vĩnh viễn!";
        }
    </script>
</body>
</html>
