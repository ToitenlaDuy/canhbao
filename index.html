<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CẢNH BÁO HỆ THỐNG</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            border: 2px solid #0f0;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            background: rgba(0, 20, 0, 0.9);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .warning-text {
            color: #ff0000;
            font-weight: bold;
            font-size: 1.5rem;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>[ HỆ THỐNG ĐÃ BỊ XÂM NHẬP ]</h1>
        <p class="warning-text">"Bạn vừa bị 'hack' vì sự thiếu cảnh giác của chính mình"</p>
        
        <div id="details">
            <p>Đang trích xuất dữ liệu: <span id="percent">0</span>%</p>
        </div>

        <div class="footer">
            Đây là một bài kiểm tra nhận thức an ninh mạng.<br>
            Đừng bao giờ click vào các đường link lạ!
        </div>
    </div>

    <script>
        // Hiệu ứng chạy phần trăm cho thêm phần "nguy hiểm"
        let count = 0;
        const counter = setInterval(() => {
            count++;
            document.getElementById('percent').innerText = count;
            if (count >= 100) clearInterval(counter);
        }, 50);

        // Hiển thị thông báo khi vừa vào trang
        window.onload = () => {
            setTimeout(() => {
                alert("Cảnh báo: Phát hiện truy cập trái phép!");
            }, 500);
        };
    </script>
</body>
</html>
